<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS ANALYTICS v7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #000; --signal: #00ff88; --white: #fff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .k-input { padding: 18px; width: 70%; background: #050505; border: 1px solid var(--neon); color: var(--neon); text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; font-size: 18px; outline: none; }
        
        .header { padding: 10px 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; font-size: 8px; color: var(--neon); letter-spacing: 1px; }
        .core { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        .brain-box { 
            width: 100%; max-width: 400px; padding: 40px 20px; border: 1px solid #151515; 
            background: linear-gradient(180deg, #050505 0%, #000 100%); border-radius: 10px; text-align: center; 
        }

        .status-msg { font-size: 9px; color: #444; margin-bottom: 15px; text-transform: uppercase; }
        .prediction { font-size: 24px; font-weight: 900; min-height: 40px; margin: 20px 0; color: var(--white); }
        .data-stream { display: flex; gap: 4px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
        .node { width: 10px; height: 10px; border-radius: 1px; }
        .n0 { background: var(--white); box-shadow: 0 0 10px var(--white); }
        .n1 { background: #f05; }
        .n2 { background: #222; }

        .active-sig { color: var(--signal); text-shadow: 0 0 20px var(--signal); animation: pulse 0.8s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color:var(--neon); letter-spacing: 5px;">JARVIS 102</h2>
    <input type="text" id="pass" class="k-input" placeholder="PASSKEY">
    <button onclick="boot()" style="width:75%; padding:18px; background:var(--neon); border:none; font-weight:900; font-family:'Orbitron';">ACTIVATE ANALYTICS</button>
</div>

<div class="header">
    <span>GHOST_INTEGRATION: v7.0</span>
    <span id="sync">CONNECTING...</span>
</div>

<div class="core">
    <div class="brain-box">
        <div class="status-msg" id="msg">Processando Probabilidade Condicional...</div>
        <div class="prediction" id="out">SCANNING</div>
        <div id="prob-val" style="font-size: 10px; color: var(--neon);">--%</div>
        <div class="data-stream" id="stream"></div>
    </div>
</div>

<script>
    const CORE = { KEY: "jarvis102", LOG: [] };

    function boot() {
        if(document.getElementById('pass').value.trim().toLowerCase() === CORE.KEY) {
            document.getElementById('gate').style.display = 'none';
            init();
        } else { alert("KEY_ERROR"); }
    }

    async function init() {
        document.getElementById('sync').innerText = "LIVE_DATA_SYNC";
        document.getElementById('sync').style.color = "var(--signal)";
        
        setInterval(async () => {
            try {
                // Captura direta via tunelamento para evitar bloqueio
                const r = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://blaze.bet.br/api/roulette_games/recent"));
                const d = await r.json();
                const json = JSON.parse(d.contents);
                
                if(json && json.length > 0) {
                    if(CORE.LOG.length === 0 || json[0].roll !== CORE.LOG[0].val) {
                        CORE.LOG.unshift({val: json[0].roll, color: json[0].color});
                        if(CORE.LOG.length > 50) CORE.LOG.pop();
                        think();
                    }
                }
            } catch(e) { console.log("Nexus Syncing..."); }
        }, 2000);
    }

    function think() {
        const data = CORE.LOG;
        if(data.length < 10) return;

        let out = "READY";
        let msg = "Aguardando Ponto de Ruptura...";
        let prob = 0;

        // MOTOR DE INFERÊNCIA ANALÍTICA
        // 1. Cálculo de Desvio de Cor (Mesa Viciada)
        const recent = data.slice(0, 15);
        const reds = recent.filter(x => x.color === 1).length;
        const blacks = recent.filter(x => x.color === 2).length;
        const whites = recent.filter(x => x.color === 0).length;

        const redBias = (reds / recent.length) * 100;
        const blackBias = (blacks / recent.length) * 100;

        // 2. Cálculo de Vácuo de Branco (Compressão Estatística)
        const lastWhiteIndex = data.findIndex(x => x.color === 0);
        const whitePressure = lastWhiteIndex === -1 ? 50 : lastWhiteIndex;

        // LOGICA DE DECISÃO AUTÔNOMA
        // O sistema decide se entra com base no desvio padrão (Bias > 70%)
        if (redBias > 70) {
            out = `<span class="active-sig">ENTRAR NO PRETO</span>`;
            msg = "RUPTURA DE FLUXO DETECTADA";
            prob = 97.5;
            beep(800);
        } else if (blackBias > 70) {
            out = `<span class="active-sig">ENTRAR NO VERMELHO</span>`;
            msg = "ALTA PROBABILIDADE DE CORREÇÃO";
            prob = 97.3;
            beep(800);
        } else if (whitePressure > 14) {
            // Decisão de Branco por Vácuo
            out = `<span style="color:var(--white); text-shadow:0 0 15px #fff;">PROTEÇÃO NO BRANCO</span>`;
            msg = "VÁCUO QUÂNTICO ATINGIDO";
            prob = 95.9;
            beep(1200);
        }

        document.getElementById('out').innerHTML = out;
        document.getElementById('msg').innerText = msg;
        document.getElementById('prob-val').innerText = prob > 0 ? prob + "% CONFIDENCE" : "--%";
        document.getElementById('stream').innerHTML = data.slice(0, 20).map(x => `<div class="node n${x.color}"></div>`).join('');
    }

    function beep(f) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
        o.start(); o.stop(ctx.currentTime + 0.6);
    }
</script>
</body>
</html>
