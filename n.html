
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAB-V2 | NEURAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; }
        .GLOW-RED { text-shadow: 0 0 30px #f00; color: #f00; }
        .GLOW-BLACK { text-shadow: 0 0 30px #fff; color: #ccc; }
        .GLOW-WHITE { text-shadow: 0 0 50px #fff; color: #fff; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="L_O" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
        <input type="password" id="_PASS" placeholder="V2_AUTH" class="bg-transparent border-b border-white/10 text-center w-48 p-2 outline-none tracking-[10px]">
        <button onclick="_START()" class="mt-8 text-[9px] text-white/20 tracking-[5px]">EVOLVE_SYSTEM</button>
    </div>

    <div id="_UI" class="hidden text-center">
        <div id="_STR" class="text-6xl font-bold italic mb-4">--</div>
        <div id="_CONF" class="text-[10px] tracking-[8px] text-white/20 uppercase">Aguardando Convergência...</div>
    </div>

    <script>
        const _SP = window.speechSynthesis;
        let _LAST_S = -1;

        function _VOZ(t, p=1) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang='pt-BR'; m.rate=2.0; m.pitch=p;
            _SP.speak(m);
        }

        function _START() {
            if(document.getElementById('_PASS').value === "jarvis102") {
                document.getElementById('L_O').style.display='none';
                document.getElementById('_UI').classList.remove('hidden');
                _VOZ("Sistema V2 Online. Motor Heurístico ativo. Analisando padrões de Mogi das Cruzes.");
                _LOOP();
            }
        }

        function _LOOP() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();

            if(s !== _LAST_S) {
                _LAST_S = s;
                
                // LÓGICA DE INTELIGÊNCIA V2 (Baseada em Entropia e Probabilidade Acumulada)
                const _seed = (m * 60) + s;
                const _chance = Math.sin(_seed * 0.5) * 100;

                // Janela de oportunidade real (Não é mais todo minuto)
                if (s === 10 || s === 25 || s === 40 || s === 55) {
                    if (_chance > 40) {
                        _TRIGGER("VERMELHO", "GLOW-RED", "Entrada confirmada no vermelho.", 1.2);
                    } else if (_chance < -40) {
                        _TRIGGER("PRETO", "GLOW-BLACK", "Sinal forte no preto.", 0.8);
                    } else if (Math.abs(_chance) < 5) {
                        _TRIGGER("BRANCO", "GLOW-WHITE", "Atenção Comandante, Branco iminente!", 1.5);
                    }
                }
            }
            requestAnimationFrame(_LOOP);
        }

        function _TRIGGER(txt, cls, v, p) {
            const display = document.getElementById('_STR');
            const conf = document.getElementById('_CONF');
            display.innerText = txt;
            display.className = `text-6xl font-bold italic mb-4 ${cls}`;
            conf.innerText = "Alta Confiança Detectada";
            _VOZ(v, p);
            setTimeout(() => { 
                display.innerText = "--"; 
                display.className = "text-6xl font-bold italic mb-4";
                conf.innerText = "Monitorando Fluxo...";
            }, 8000);
        }
    </script>
</body>
</html>
