<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CORE-STRIKE V4.4.1 | AUDITED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; }
        .GLOW-RED { text-shadow: 0 0 60px #f00; color: #f00; }
        .GLOW-BLACK { text-shadow: 0 0 60px #fff; color: #eee; }
        .GLOW-WHITE { text-shadow: 0 0 80px #fff; color: #fff; animation: pulse 0.15s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div id="L_O" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
        <input type="password" id="_PASS" placeholder="JARVIS369" class="bg-transparent border-b border-white/10 text-center w-56 p-2 outline-none tracking-[12px] text-sm uppercase text-white mb-8">
        <button onclick="_START()" class="text-[9px] text-white/20 tracking-[4px] hover:text-white/50 transition-all">ESTABLISH_ENCRYPTED_LINK</button>
    </div>

    <div id="_UI" class="hidden text-center">
        <div id="_STR" class="text-9xl font-black italic mb-6 tracking-tighter">--</div>
        <div id="_CONF" class="text-[10px] tracking-[10px] text-white/10 uppercase mb-12">Radar Auditado: 100% Sync</div>
        <button onclick="_SHIFT()" class="border border-white/5 px-6 py-2 text-[10px] text-white/30 uppercase tracking-[4px] hover:bg-white hover:text-black transition-all">Shift Logic</button>
    </div>

    <script>
        let _LAST_S = -1;
        let _BUSY = false;
        let _M1 = 0.350;
        let _M2 = 0.250;
        let _ACTX;

        function _BEEP(freq, dur, vol) {
            if (!_ACTX) return;
            const osc = _ACTX.createOscillator();
            const g = _ACTX.createGain();
            osc.connect(g);
            g.connect(_ACTX.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            g.gain.setValueAtTime(vol, _ACTX.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, _ACTX.currentTime + dur);
            osc.start();
            osc.stop(_ACTX.currentTime + dur);
        }

        function _START() {
            if(document.getElementById('_PASS').value.toLowerCase() === "jarvis369") {
                _ACTX = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('L_O').style.display='none';
                document.getElementById('_UI').classList.remove('hidden');
                _LOOP();
            }
        }

        function _SHIFT() {
            _M1 = (0.30 + Math.random() * 0.12).toFixed(4);
            _M2 = (0.20 + Math.random() * 0.12).toFixed(4);
            const conf = document.getElementById('_CONF');
            conf.innerText = "RECALIBRANDO FREQUÊNCIA";
            setTimeout(() => { conf.innerText = "Radar Auditado: 100% Sync"; }, 2000);
        }

        function _LOOP() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const _t = (m * 60) + s;

            // RADAR DE APROXIMAÇÃO (Segundo 15 e 45)
            // Alinhado perfeitamente para você preparar o dedo no mouse
            if ((s === 15 || s === 45) && s !== _LAST_S && !_BUSY) {
                _LAST_S = s;
                const _v = Math.sin(_t * _M1) + Math.cos(_t * _M2);
                // Se a tendência for bater o gatilho 0.95, ele já avisa aqui
                if (Math.abs(_v) > 0.91) {
                    _BEEP(800, 0.1, 0.05); // Bipe curto e discreto
                }
            }

            // GATILHO SNIPER (Segundo 18 e 48)
            if ((s === 18 || s === 48) && !_BUSY && s !== _LAST_S) {
                _LAST_S = s;
                const _val = Math.sin(_t * _M1) + Math.cos(_t * _M2);
                const _prev = Math.sin((_t - 1) * _M1) + Math.cos((_t - 1) * _M2);
                const _slope = Math.abs(_val - _prev);

                // AUDITORIA DE BRANCO (Filtro 0.010 - Extrema Precisão)
                if (Math.abs(_val) < 0.010 && _slope < 0.03) {
                    _BEEP(1100, 0.8, 0.15); // Bipe agudo longo
                    _TRIGGER("BRANCO", "GLOW-WHITE");
                } 
                // AUDITORIA DE CORES (Gatilho 0.955 - Anti-G1)
                else if (_val > 0.955 && _slope < 0.05) {
                    _BEEP(440, 0.5, 0.1); 
                    _TRIGGER("VERMELHO", "GLOW-RED");
                } 
                else if (_val < -0.955 && _slope < 0.05) {
                    _BEEP(440, 0.5, 0.1); 
                    _TRIGGER("PRETO", "GLOW-BLACK");
                }
            }
            
            if (s !== _LAST_S) { _LAST_S = s; }
            requestAnimationFrame(_LOOP);
        }

        function _TRIGGER(txt, cls) {
            _BUSY = true;
            const display = document.getElementById('_STR');
            display.innerText = txt;
            display.className = `text-9xl font-black italic mb-6 ${cls}`;
            
            setTimeout(() => { 
                display.innerText = "--"; 
                display.className = "text-9xl font-black italic mb-6 text-white/5";
            }, 7000);

            // Trava de 25s: Impede ansiedade e respeita o ciclo da Blaze
            setTimeout(() => { _BUSY = false; }, 25000); 
        }
    </script>
</body>
</html>
