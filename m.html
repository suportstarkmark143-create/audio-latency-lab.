
     <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORE-STRIKE V4.1 | OVERKILL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; }
        .GLOW-RED { text-shadow: 0 0 60px #f00; color: #f00; font-weight: 900; }
        .GLOW-BLACK { text-shadow: 0 0 60px #fff; color: #eee; font-weight: 900; }
        .GLOW-WHITE { text-shadow: 0 0 80px #fff; color: #fff; animation: pulse 0.15s infinite; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
        .btn-shift { border: 1px solid rgba(255,255,255,0.1); padding: 8px 20px; font-size: 11px; border-radius: 4px; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.02); }
        .btn-shift:active { transform: scale(0.9); background: #fff; color: #000; }
        #_MONITOR { font-family: monospace; color: #333; font-size: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="L_O" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center text-center">
        <input type="password" id="_PASS" placeholder="ACCESS_V4.1" class="bg-transparent border-b border-white/10 text-center w-56 p-2 outline-none tracking-[12px] text-sm uppercase text-white">
        <button onclick="_START()" class="mt-10 text-[9px] text-white/30 tracking-[6px] hover:text-white/80 transition-all">ESTABLISH_LINK</button>
    </div>

    <div id="_UI" class="hidden text-center">
        <div id="_STR" class="text-9xl italic mb-6 tracking-tighter transition-all duration-300">--</div>
        <div id="_CONF" class="text-[10px] tracking-[12px] text-white/20 uppercase mb-12">Neural Engine: Active</div>
        
        <button onclick="_SHIFT()" class="btn-shift text-white/40 uppercase tracking-widest hover:text-white">Shift Logic</button>
        <div id="_MONITOR">M1: 0.350 | M2: 0.250</div>
    </div>

    <script>
        let _LAST_S = -1;
        let _BUSY = false;
        let _M1 = 0.35;
        let _M2 = 0.25;

        function _START() {
            // NOVA CHAVE DE SEGURANÇA APLICADA: jarvis369
            if(document.getElementById('_PASS').value.toLowerCase() === "jarvis369") {
                document.getElementById('L_O').style.display='none';
                document.getElementById('_UI').classList.remove('hidden');
                _LOOP();
            }
        }

        function _SHIFT() {
            _M1 = (0.20 + Math.random() * 0.30).toFixed(3);
            _M2 = (0.15 + Math.random() * 0.25).toFixed(3);
            document.getElementById('_MONITOR').innerText = `M1: ${_M1} | M2: ${_M2}`;
            const conf = document.getElementById('_CONF');
            conf.innerText = "ALGORITMO RECALIBRADO";
            setTimeout(() => { conf.innerText = "Neural Engine: Active"; }, 2000);
        }

        function _LOOP() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();

            const _TIMING_WINDOW = (s === 18 || s === 48);

            if(_TIMING_WINDOW && !_BUSY && s !== _LAST_S) {
                _LAST_S = s;
                const _t = (m * 60) + s;
                
                const _val = Math.sin(_t * _M1) + Math.cos(_t * _M2);
                const _prev = Math.sin((_t - 1) * _M1) + Math.cos((_t - 1) * _M2);
                const _slope = Math.abs(_val - _prev); 

                if (Math.abs(_val) < 0.035) {
                    _TRIGGER("BRANCO", "GLOW-WHITE");
                } 
                else if (_val > 0.84 && _slope < 0.11) {
                    _TRIGGER("VERMELHO", "GLOW-RED");
                } else if (_val < -0.84 && _slope < 0.11) {
                    _TRIGGER("PRETO", "GLOW-BLACK");
                }
            }
            requestAnimationFrame(_LOOP);
        }

        function _TRIGGER(txt, cls) {
            _BUSY = true;
            const display = document.getElementById('_STR');
            display.innerText = txt;
            display.className = `text-9xl italic mb-6 ${cls}`;

            setTimeout(() => { 
                display.innerText = "--"; 
                display.className = "text-9xl italic mb-6 text-white/10";
            }, 7000);

            setTimeout(() => { _BUSY = false; }, 25000); 
        }
    </script>
</body>
</html>
