<script>
    // MOTOR DE PRECISÃO V3.3 - SNIPER BLIND
    function _LOOP() {
        const now = new Date();
        const s = now.getSeconds();
        const m = now.getMinutes();

        if(s !== _LAST_S && !_BUSY) {
            _LAST_S = s;
            const _t = (m * 60) + s;
            
            // Ondas de longo período para evitar o efeito metralhadora
            const _val = Math.sin(_t * 0.35) + Math.cos(_t * 0.25);
            const _prev = Math.sin((_t-1) * 0.35) + Math.cos((_t-1) * 0.25);
            const _slope = Math.abs(_val - _prev); 

            // 1. O BRANCO CIRÚRGICO (Reduzido para 0.04 de margem)
            if (Math.abs(_val) < 0.04) {
                _TRIGGER("BRANCO", "GLOW-WHITE", "Alvo Branco. Entrada de alta confiança.", 1.8);
            } 
            // 2. STRIKE DE COR (Exigência de 0.85 de Estabilidade)
            else {
                // Só dispara se o valor for extremo e a mudança (slope) for suave
                if (_val > 0.85 && _slope < 0.10) {
                    _TRIGGER("VERMELHO", "GLOW-RED", "Strike. Vermelho confirmado.", 1.1);
                } else if (_val < -0.85 && _slope < 0.10) {
                    _TRIGGER("PRETO", "GLOW-BLACK", "Strike. Preto confirmado.", 0.8);
                }
            }
        }
        requestAnimationFrame(_LOOP);
    }

    function _TRIGGER(txt, cls, v, p) {
        _BUSY = true;
        const display = document.getElementById('_STR');
        const conf = document.getElementById('_CONF');
        display.innerText = txt;
        display.className = `text-8xl font-black italic mb-6 ${cls}`;
        conf.innerText = "SINAL SNIPER ATIVO";
        _VOZ(v, p);

        setTimeout(() => { 
            display.innerText = "--"; 
            display.className = "text-8xl font-black italic mb-6";
            conf.innerText = "Aguardando Zona de Exaustão...";
        }, 8000);

        // Trava de 30s: Sincronia perfeita com o tempo total de rodada + resultado
        setTimeout(() => { _BUSY = false; }, 30000); 
    }
</script>
